<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vigatec Runner — Iniciar sesión</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.10);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-icon {
      width: 52px;
      height: 52px;
      background: #1a56db;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .logo-icon svg {
      width: 28px;
      height: 28px;
      fill: #ffffff;
    }

    .logo-area h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #111827;
      letter-spacing: -0.02em;
    }

    .logo-area p {
      font-size: 0.875rem;
      color: #6b7280;
      margin-top: 0.25rem;
    }

    .error-box {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-bottom: 1.25rem;
      font-size: 0.875rem;
      color: #b91c1c;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .error-box::before {
      content: "⚠";
      font-size: 1rem;
      flex-shrink: 0;
    }

    .field {
      margin-bottom: 1.125rem;
    }

    label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: #374151;
      margin-bottom: 0.375rem;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 0.625rem 0.875rem;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.9375rem;
      color: #111827;
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #1a56db;
      box-shadow: 0 0 0 3px rgba(26, 86, 219, 0.12);
    }

    input[type="email"]::placeholder,
    input[type="password"]::placeholder {
      color: #9ca3af;
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.75rem;
      background: #1a56db;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 0.9375rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.15s, transform 0.1s;
    }

    button[type="submit"]:hover {
      background: #1649c0;
    }

    button[type="submit"]:active {
      transform: scale(0.98);
    }

    .footer-note {
      text-align: center;
      margin-top: 1.75rem;
      font-size: 0.75rem;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="logo-area">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
        </svg>
      </div>
      <h1>Vigatec Runner</h1>
      <p>Ingresa tus credenciales para continuar</p>
    </div>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <input type="hidden" name="next" value="{{ next }}" />

      <div class="field">
        <label for="email">Correo electrónico</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="usuario@empresa.cl"
          autocomplete="email"
          required
          autofocus
        />
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>

      <button type="submit">Iniciar sesión</button>
    </form>

    <p class="footer-note">Vigatec Runner &copy; {{ 2026 }} &mdash; Acceso restringido</p>
  </div>
</body>
</html>
